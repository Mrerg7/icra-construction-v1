name = "icra-construction-v1"
main = "src/worker.ts"
compatibility_date = "2026-06-29"
workers_dev = false
preview_urls = false

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = true

[[routes]]
pattern = "icra.construction"
zone_name = "icra.construction"

[[routes]]
pattern = "www.icra.construction"
zone_name = "icra.construction"
